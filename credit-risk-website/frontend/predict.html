<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predict - AI Credit Risk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">CreditRisk AI</div>
        <div class="hamburger" id="hamburger">☰</div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="predict.html" class="active">Predict</a></li>
            <li><a href="history.html">History</a></li>
            <li><a href="index.html#about">About</a></li>
        </ul>
    </nav>

    <main class="section form-page">
        <div class="container">
            <h2 class="text-center" style="margin-bottom: 30px;">Enter Details for Prediction</h2>
            <div class="card form-card">
                <form id="prediction-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="name" required placeholder="e.g. John Doe">
                        </div>
                        <div class="form-group">
                            <label>Age (18-70)</label>
                            <input type="number" id="age" min="18" max="70" required placeholder="Years">
                        </div>
                        <div class="form-group">
                            <label>Annual Income (₹)</label>
                            <input type="number" id="income" min="0" required placeholder="e.g. 500000">
                        </div>
                        <div class="form-group">
                            <label>Loan Amount (₹)</label>
                            <input type="number" id="loan_amount" min="1" required placeholder="e.g. 200000">
                        </div>
                        <div class="form-group">
                            <label>Loan Duration</label>
                            <select id="loan_duration" required>
                                <option value="" disabled selected>Select duration</option>
                                <option value="1 Year">1 Year</option>
                                <option value="2 Years">2 Years</option>
                                <option value="3 Years">3 Years</option>
                                <option value="5 Years">5 Years</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Credit Score (300-850)</label>
                            <input type="number" id="credit_score" min="300" max="850" required placeholder="e.g. 750">
                        </div>
                        <div class="form-group">
                            <label>Employment Years (0-40)</label>
                            <input type="number" id="employment_years" min="0" max="40" required placeholder="e.g. 5">
                        </div>
                        <div class="form-group">
                            <label>Existing Loans (0-10)</label>
                            <input type="number" id="existing_loans" min="0" max="10" required placeholder="e.g. 1">
                        </div>
                        <div class="form-group">
                            <label>Loan Purpose</label>
                            <select id="loan_purpose" required>
                                <option value="" disabled selected>Select purpose</option>
                                <option value="Home">Home</option>
                                <option value="Car">Car</option>
                                <option value="Education">Education</option>
                                <option value="Business">Business</option>
                                <option value="Personal">Personal</option>
                            </select>
                        </div>
                    </div>
                    
                    <div id="error-message" class="error-msg hide"></div>
                    
                    <button type="submit" class="btn btn-primary btn-block" id="submit-btn" style="margin-top:20px;">
                        <span id="btn-text">Predict</span>
                        <div class="spinner hide" id="spinner"></div>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 AI Credit Risk Prediction System. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
